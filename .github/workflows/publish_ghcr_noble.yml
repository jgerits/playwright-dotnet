name: Publish GHCR Docker (noble, .NET 10)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr-noble:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install prerequisites and download drivers
        shell: bash
        run: ./build.sh --download-driver

      - name: Build and push noble image
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: |
          OWNER_LC="${OWNER,,}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          IMAGE="ghcr.io/${OWNER_LC}/${REPO_NAME}"
          SHA_TAG="sha-${SHA}"
          bash utils/docker/build.sh --amd64 noble "${IMAGE}:${SHA_TAG}"
          docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:noble-dotnet10"
          docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:noble"
          docker push "${IMAGE}:${SHA_TAG}"
          docker push "${IMAGE}:noble-dotnet10"
          docker push "${IMAGE}:noble"
