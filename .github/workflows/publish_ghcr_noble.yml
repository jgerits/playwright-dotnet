name: Publish GHCR Docker (noble, .NET 10)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr-noble:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install prerequisites and download drivers
        shell: bash
        run: ./build.sh --download-driver

      - name: Build and push noble image
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: |
          OWNER_LC="${OWNER,,}"
          IMAGE="ghcr.io/${OWNER_LC}/playwright-dotnet"
          SHA_TAG="sha-${SHA}"
          bash utils/docker/build.sh --amd64 noble "${IMAGE}:${SHA_TAG}"
          docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:noble-dotnet10"
          docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:noble"
          docker push "${IMAGE}:${SHA_TAG}"
          docker push "${IMAGE}:noble-dotnet10"
          docker push "${IMAGE}:noble"

      - name: Set package visibility to public
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER_LC="${OWNER,,}"
          IMAGE="ghcr.io/${OWNER_LC}/playwright-dotnet"
          PACKAGE="${IMAGE#ghcr.io/}"
          PACKAGE_NAME="${PACKAGE#*/}"
          TARGETS=("users/${OWNER}" "orgs/${OWNER}")
          PACKAGES=("${PACKAGE}" "${PACKAGE_NAME}")

          updated=false
          for target in "${TARGETS[@]}"; do
            for pkg in "${PACKAGES[@]}"; do
              pkg_encoded="${pkg//\//%2F}"
              url="https://api.github.com/${target}/packages/container/${pkg_encoded}/visibility"
              echo "Attempting: ${url}"
              if curl -fsSL -X PATCH \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                "${url}" \
                -d '{"visibility":"public"}'; then
                updated=true
                break 2
              fi
            done
          done

          if [ "${updated}" != "true" ]; then
            echo "Failed to update GHCR package visibility for IMAGE=${IMAGE}" >&2
            exit 1
          fi
